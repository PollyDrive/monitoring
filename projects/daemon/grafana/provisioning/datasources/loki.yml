apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 5000
      derivedFields:
        # Связываем уровень лога с меткой
        - name: level
          matcherRegex: "(ERROR|WARNING|INFO|DEBUG)"
          url: ""
