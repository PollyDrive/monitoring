
services:
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      # Провайдер-конфиги (.yml) монтируются в корень — Grafana читает только этот уровень
      - ./projects/daemon/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/daemon.yml:ro
      - ./projects/daemon/grafana/provisioning/datasources/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
      - ./projects/lebowski/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/lebowski.yml:ro
      # JSON-дашборды монтируются в подпапки по проектам (путь совпадает с path: в dashboards.yml)
      - ./projects/daemon/grafana/provisioning/dashboards:/etc/grafana/dashboards/daemon:ro
      - ./projects/lebowski/grafana/provisioning/dashboards:/etc/grafana/dashboards/lebowski:ro
      # Когда добавится новый проект — добавить 2 строки по аналогии:
      # - ./projects/myapp/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/myapp.yml:ro
      # - ./projects/myapp/grafana/provisioning/dashboards:/etc/grafana/dashboards/myapp:ro
    networks:
      - monitoring
    depends_on:
      - loki

volumes:
  loki_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
    name: monitoring