name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose.yml to server
        run: |
          ssh root@${{ secrets.SERVER_IP }} "mkdir -p /opt/alina/monitoring"
          scp docker-compose.yml root@${{ secrets.SERVER_IP }}:/opt/alina/monitoring/

      - name: Deploy on server
        run: |
          ssh root@${{ secrets.SERVER_IP }} "
            cd /opt/alina/monitoring &&
            echo 'GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}' > .env
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
          "
